openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: AI Workforce API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: organizations
    description: Organization management
  - name: agents
    description: AI Agent management
  - name: tasks
    description: Task management
  - name: executions
    description: Execution records
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /organizations:
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Create an organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrganizationNew"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"

  /agents:
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create an AI agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentNew"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all agents
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /tasks:
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task (async execution)
      description: Creates a task and returns immediately. Worker picks it up in the background.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskNew"
      responses:
        "201":
          description: Task queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /executions:
    get:
      operationId: listExecutions
      tags: [executions]
      summary: List executions
      parameters:
        - name: taskId
          in: query
          required: false
          schema:
            type: integer
        - name: agentId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of executions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Execution"

  /executions/{id}:
    get:
      operationId: getExecution
      tags: [executions]
      summary: Get an execution by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Execution found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Execution"
        "404":
          description: Execution not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Organization:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrganizationNew:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string

    Agent:
      type: object
      required: [id, organizationId, name, role, systemPrompt, model, outputFormat, createdAt, updatedAt]
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        name:
          type: string
        role:
          type: string
        systemPrompt:
          type: string
        model:
          type: string
        outputFormat:
          type: string
        outputSchema:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgentNew:
      type: object
      required: [organizationId, name, role, systemPrompt]
      properties:
        organizationId:
          type: integer
        name:
          type: string
          minLength: 1
        role:
          type: string
          minLength: 1
        systemPrompt:
          type: string
          minLength: 1
        model:
          type: string
        outputFormat:
          type: string
          enum: ["text", "json"]
        outputSchema:
          type: string

    Task:
      type: object
      required: [id, agentId, organizationId, input, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        agentId:
          type: integer
        organizationId:
          type: integer
        input:
          type: string
        status:
          type: string
        result:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        executionMs:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskNew:
      type: object
      required: [agentId, organizationId, input]
      properties:
        agentId:
          type: integer
        organizationId:
          type: integer
        input:
          type: string
          minLength: 1

    Execution:
      type: object
      required: [id, taskId, agentId, startedAt, promptTokens, completionTokens, totalTokens, estimatedCost, status]
      properties:
        id:
          type: integer
        taskId:
          type: integer
        agentId:
          type: integer
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        totalTokens:
          type: integer
        estimatedCost:
          type: number
        status:
          type: string
        output:
          type: ["string", "null"]
